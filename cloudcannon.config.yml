collections_config:
  pages:
    path: ''
    icon: wysiwyg
    disable_url: false
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
  cms_settings:
    path: cms/settings
    icon: reset_settings
    disable_url: false
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
  cms_productos:
    path: cms/productos
    icon: nest_protect
    disable_url: false
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
  admin:
    path: admin
    icon: ad
    disable_url: false
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
base_url: https://golden-macadamia.cloudvent.net
timezone: Etc/UTC
collections:
  productos_cascos:
    _options:
      icon: shopping_bag
      label: Cascos
      display:
        fields:
          - name
          - price
          - badge
    path: cms/cascos
    type: json
    fields:
      - name: name
        label: Nombre del Producto
        type: text
        required: true
      - name: price
        label: Precio
        type: text
        required: true
        comment: 'Formato: $1.234.567'
      - name: sizes
        label: Tallas Disponibles
        type: text
        required: true
        comment: 'Ej: S/M/L/XL o 38/39/40/41'
      - name: image
        label: Imagen del Producto
        type: image
        required: true
      - name: badge
        label: Etiqueta Destacada
        type: select
        options:
          values:
            - ''
            - Premium
            - Top Ventas
            - Nuevo
            - Edicion Limitada
            - Oferta
        comment: Etiqueta que aparece en la esquina
  productos_uniformes:
    _options:
      icon: shopping_bag
      label: Uniformes
      display:
        fields:
          - name
          - price
          - badge
    path: cms/uniformes
    type: json
    fields:
      - name: name
        label: Nombre del Producto
        type: text
        required: true
      - name: price
        label: Precio
        type: text
        required: true
        comment: 'Formato: $1.234.567'
      - name: sizes
        label: Tallas Disponibles
        type: text
        required: true
        comment: 'Ej: S/M/L/XL'
      - name: image
        label: Imagen del Producto
        type: image
        required: true
      - name: badge
        label: Etiqueta Destacada
        type: select
        options:
          values:
            - ''
            - Premium
            - Top Ventas
            - Nuevo
            - Edicion Limitada
            - Oferta
  productos_botas:
    _options:
      icon: shopping_bag
      label: Botas
      display:
        fields:
          - name
          - price
          - badge
    path: cms/botas
    type: json
    fields:
      - name: name
        label: Nombre del Producto
        type: text
        required: true
      - name: price
        label: Precio
        type: text
        required: true
        comment: 'Formato: $1.234.567'
      - name: sizes
        label: Tallas Disponibles
        type: text
        required: true
        comment: 'Ej: 38/39/40/41 o 7-11 US'
      - name: image
        label: Imagen del Producto
        type: image
        required: true
      - name: badge
        label: Etiqueta Destacada
        type: select
        options:
          values:
            - ''
            - Premium
            - Top Ventas
            - Nuevo
            - Edicion Limitada
            - Oferta
  productos_protecciones:
    _options:
      icon: shopping_bag
      label: Protecciones
      display:
        fields:
          - name
          - price
          - badge
    path: cms/protecciones
    type: json
    fields:
      - name: name
        label: Nombre del Producto
        type: text
        required: true
      - name: price
        label: Precio
        type: text
        required: true
        comment: 'Formato: $1.234.567'
      - name: sizes
        label: Tallas Disponibles
        type: text
        required: true
        comment: 'Ej: Única/S/M/L/XL'
      - name: image
        label: Imagen del Producto
        type: image
        required: true
      - name: badge
        label: Etiqueta Destacada
        type: select
        options:
          values:
            - ''
            - Premium
            - Top Ventas
            - Nuevo
            - Edicion Limitada
            - Oferta
  testimonials:
    _options:
      icon: star
      label: Testimonios
      display:
        fields:
          - name
          - location
          - text
    path: cms/testimonials
    type: json
    fields:
      - name: name
        label: Nombre del Cliente
        type: text
        required: true
      - name: location
        label: Ciudad, Departamento
        type: text
        required: true
      - name: text
        label: Testimonio
        type: text
        required: true
      - name: avatar
        label: Iniciales (Avatar)
        type: text
        required: true
        comment: '2 letras. Ej: CR, JM'
  settings:
    _options:
      icon: settings
      label: Configuración
      singleton: true
      display:
        fields:
          - whatsapp
          - address
          - email
    path: cms/settings
    type: yaml
    fields:
      - name: whatsapp
        label: Número de WhatsApp
        type: text
        required: true
        comment: 'Solo números. Ej: 573176692997'
      - name: address
        label: Dirección Física
        type: text
        required: true
      - name: email
        label: Email de Contacto
        type: text
        required: true
      - name: facebook
        label: Facebook URL
        type: text
        comment: Link completo https://facebook.com/...
      - name: instagram
        label: Instagram URL
        type: text
        comment: Link completo https://instagram.com/...
      - name: tiktok
        label: TikTok URL
        type: text
        comment: Link completo https://tiktok.com/...
media:
  cloudcannon:
    - source: assets/images/cms
      path: assets/images/cms
      optimize: true
      max_size: 5MB
    - source: assets/logo
      path: assets/logo
      optimize: true
snippets:
  - label: Producto Destacado
    template: |
      <div class="product-card featured">
        <span class="badge">Nuevo</span>
      </div>
preview:
  enabled: true
  environment: production
