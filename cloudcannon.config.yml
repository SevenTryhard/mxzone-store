# ============================================
# MXZONE STORE - CloudCannon Configuration
# ============================================
# Documentación: https://cloudcannon.com/documentation/
#
# CONFIGURACIÓN PARA CLOUDCANNON - CMS VISUAL GRATIS
# ============================================

base_url: https://golden-macadamia.cloudvent.net

collections:
  # ==========================================
  # PRODUCTOS - Todos en una sola colección
  # ==========================================
  productos:
    _options:
      icon: shopping_bag
      label: Productos
      display:
        fields:
          - name
          - price
          - category
          - badge
    path: cms/productos
    type: json
    fields:
      - name: name
        label: Nombre del Producto
        type: text
        required: true
      - name: price
        label: Precio
        type: text
        required: true
        comment: "Formato: $1.234.567"
      - name: sizes
        label: Tallas Disponibles
        type: text
        required: true
        comment: "Ej: S/M/L/XL o 38/39/40/41"
      - name: image
        label: Imagen del Producto
        type: image
        required: true
      - name: badge
        label: Etiqueta Destacada
        type: select
        options:
          values:
            - ""
            - "Premium"
            - "Top Ventas"
            - "Nuevo"
            - "Edicion Limitada"
            - "Oferta"
        comment: "Etiqueta que aparece en la esquina"
      - name: category
        label: Categoría
        type: select
        required: true
        options:
          values:
            - cascos
            - uniformes
            - botas
            - protecciones

  # ==========================================
  # TESTIMONIOS
  # ==========================================
  testimonials:
    _options:
      icon: star
      label: Testimonios
      display:
        fields:
          - name
          - location
          - text
    path: cms/testimonials
    type: json
    fields:
      - name: name
        label: Nombre del Cliente
        type: text
        required: true
      - name: location
        label: Ciudad, Departamento
        type: text
        required: true
      - name: text
        label: Testimonio
        type: text
        required: true
      - name: avatar
        label: Iniciales (Avatar)
        type: text
        required: true
        comment: "2 letras. Ej: CR, JM"

  # ==========================================
  # CONFIGURACIÓN GENERAL
  # ==========================================
  settings:
    _options:
      icon: settings
      label: Configuración
      singleton: true
      display:
        fields:
          - whatsapp
          - address
          - email
    path: cms/settings
    type: yaml
    fields:
      - name: whatsapp
        label: Número de WhatsApp
        type: text
        required: true
        comment: "Solo números. Ej: 573176692997"
      - name: address
        label: Dirección Física
        type: text
        required: true
      - name: email
        label: Email de Contacto
        type: text
        required: true
      - name: facebook
        label: Facebook URL
        type: text
        comment: "Link completo https://facebook.com/..."
      - name: instagram
        label: Instagram URL
        type: text
        comment: "Link completo https://instagram.com/..."
      - name: tiktok
        label: TikTok URL
        type: text
        comment: "Link completo https://tiktok.com/..."

# ==========================================
# MEDIOS - Imágenes y Archivos
# ==========================================
media:
  cloudcannon:
    - source: assets/images/cms
      path: assets/images/cms
      optimize: true
      max_size: 5MB
    - source: assets/logo
      path: assets/logo
      optimize: true

# ==========================================
# SNIPPETS - Componentes Reutilizables
# ==========================================
snippets:
  - label: Producto Destacado
    template: |
      <div class="product-card featured">
        <span class="badge">Nuevo</span>
      </div>

# ==========================================
# VISTA PREVIA EN VIVO
# ==========================================
preview:
  enabled: true
  environment: production
