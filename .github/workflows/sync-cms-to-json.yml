name: Sync CMS Products to JSON

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync products from CMS API
        run: node -e "
          const fs = require('fs');
          const path = require('path');

          const API_URL = 'https://growisoulsand.pages.dev/api/store/products?project=SevenTryhard%2Fmxzone-store';
          const OUT_DIR = 'cms/productos';

          function slugify(name) {
            return name
              .toLowerCase()
              .normalize('NFD')
              .replace(/[\u0300-\u036f]/g, '')
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/^-+|-+$/g, '');
          }

          async function main() {
            console.log('Fetching products from', API_URL);
            const res = await fetch(API_URL, { headers: { Accept: 'application/json' } });
            if (!res.ok) throw new Error('API responded ' + res.status);
            const data = await res.json();
            const products = data.products || [];
            console.log('Received', products.length, 'products');

            const desiredFiles = new Set();
            for (const p of products) {
              const slug = slugify(p.name || 'unknown');
              const safeSlug = slug || 'producto-sin-nombre';
              const fileName = safeSlug + '.json';
              const filePath = path.join(OUT_DIR, fileName);

              const payload = {
                name: p.name || '',
                image: p.image || '',
                price: p.price || '',
                sizes: p.sizes || '',
                badge: p.badge || '',
                category: p.category || '',
                description: p.description || '',
                images: Array.isArray(p.images) ? p.images : [],
                sku: p.sku || '',
                color: p.color || '',
                agotado: p.agotado === true
              };

              fs.writeFileSync(filePath, JSON.stringify(payload, null, 2) + '\n', 'utf8');
              desiredFiles.add(fileName);
            }

            const existing = fs.readdirSync(OUT_DIR).filter(f => f.endsWith('.json') && f !== 'index.json');
            let removed = 0;
            for (const f of existing) {
              if (!desiredFiles.has(f)) {
                fs.unlinkSync(path.join(OUT_DIR, f));
                removed++;
                console.log('Removed ghost file:', f);
              }
            }

            const currentFiles = fs.readdirSync(OUT_DIR)
              .filter(f => f.endsWith('.json') && f !== 'index.json')
              .sort();
            const indexData = {
              files: currentFiles,
              total: currentFiles.length,
              generated: new Date().toISOString().split('T')[0]
            };
            fs.writeFileSync(path.join(OUT_DIR, 'index.json'), JSON.stringify(indexData, null, 2) + '\n', 'utf8');
            console.log('index.json regenerated:', currentFiles.length, 'products');
            console.log('Removed', removed, 'ghost files');
          }

          main().catch(err => {
            console.error('Sync failed:', err.message);
            process.exit(1);
          });
        "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cms/productos/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "sync(cms): auto-sync products from Growisoulsand API [skip-ci]"
            for i in 1 2 3; do
              git pull --rebase && git push && break || sleep 5
            done
            echo "Push completed"
          fi
