<!DOCTYPE html>
<html>
<head><title>Test Imágenes</title></head>
<body>
<h1>Test de Imágenes - MXZONE</h1>

<h2>GAFAS</h2>
<img src="/assets/images/gafas/lentescross100-accuri2fairbanksnegrovisordorado.webp" alt="Gafas Test" style="max-width:200px;">
<p>Ruta: /assets/images/gafas/lentescross100-accuri2fairbanksnegrovisordorado.webp</p>

<h2>GUANTES</h2>
<img src="/assets/images/guantes/fly-f-16-mx-gloves-red-black-1.webp" alt="Guantes Test" style="max-width:200px;">
<p>Ruta: /assets/images/guantes/fly-f-16-mx-gloves-red-black-1.webp</p>

<h2>BOTAS (Referencia)</h2>
<img src="/assets/images/botas/alpinestars-botas-tech-3.jpeg" alt="Botas Test" style="max-width:200px;">
<p>Ruta: /assets/images/botas/alpinestars-botas-tech-3.jpeg</p>

<script>
document.querySelectorAll('img').forEach(img => {
  img.onerror = function() {
    this.style.border = '3px solid red';
    this.alt = 'ERROR: ' + this.src;
    console.error('❌ ERROR cargando imagen:', this.src);
  };
  img.onload = function() {
    this.style.border = '3px solid green';
    console.log('✅ Imagen cargada exitosamente:', this.src);
  };
});
</script>
</body>
</html>
