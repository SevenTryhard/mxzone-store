<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MXZONE CMS | Panel Administrativo</title>
    <meta name="description" content="Panel de administracion para MXZONE STORE">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
      :root {
        --orange-primary: #FF6600;
        --orange-dark: #CC5200;
        --gray-dark: #1A1A1A;
        --gray-medium: #2D2D2D;
        --white: #FFFFFF;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Montserrat', sans-serif; background: var(--gray-dark); }

      .cms-header {
        background: linear-gradient(135deg, var(--orange-primary) 0%, var(--orange-dark) 100%);
        padding: 1.25rem 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 4px 20px rgba(255, 102, 0, 0.3);
        position: sticky;
        top: 0;
        z-index: 1000;
      }
      .cms-logo { display: flex; align-items: center; gap: 0.75rem; }
      .cms-logo img { height: 45px; width: auto; }
      .cms-logo-text h1 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 1.8rem;
        letter-spacing: 3px;
        color: var(--white);
        margin: 0;
        line-height: 1;
      }
      .cms-logo-text span { font-size: 0.75rem; color: rgba(255, 255, 255, 0.85); font-weight: 500; }

      #nc-root { min-height: calc(100vh - 80px); }
    </style>
  </head>
  <body>
    <header class="cms-header">
      <div class="cms-logo">
        <img src="../assets/logo/logo.png" alt="MXZONE" />
        <div class="cms-logo-text">
          <h1>MXZONE CMS</h1>
          <span>PANEL ADMINISTRATIVO</span>
        </div>
      </div>
    </header>

    <div id="nc-root"></div>

    <!-- Decap CMS con configuración para GitHub -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
