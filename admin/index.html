<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MXZONE CMS | Panel Administrativo</title>
    <meta name="description" content="Panel de administracion para MXZONE STORE">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Netlify Identity -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <!-- Custom Styles -->
    <style>
      :root {
        --orange-primary: #FF6600;
        --orange-dark: #CC5200;
        --gray-dark: #1A1A1A;
        --gray-medium: #2D2D2D;
        --white: #FFFFFF;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Montserrat', sans-serif;
        background: var(--gray-dark);
      }

      /* Header del CMS */
      .cms-header {
        background: linear-gradient(135deg, var(--orange-primary) 0%, var(--orange-dark) 100%);
        padding: 1.25rem 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 4px 20px rgba(255, 102, 0, 0.3);
        position: sticky;
        top: 0;
        z-index: 1000;
      }

      .cms-header-content {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .cms-logo {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .cms-logo img {
        height: 45px;
        width: auto;
      }

      .cms-logo-text {
        display: flex;
        flex-direction: column;
      }

      .cms-logo-text h1 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 1.8rem;
        letter-spacing: 3px;
        color: var(--white);
        margin: 0;
        line-height: 1;
      }

      .cms-logo-text span {
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.85);
        font-weight: 500;
        letter-spacing: 1px;
      }

      .cms-header-actions {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .cms-user-info {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: var(--white);
        font-size: 0.9rem;
      }

      .cms-user-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        font-size: 0.8rem;
      }

      .cms-logout-btn {
        background: rgba(255, 255, 255, 0.2);
        border: none;
        color: white;
        padding: 0.5rem 1rem;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.85rem;
        font-weight: 600;
        transition: background 0.3s ease;
      }

      .cms-logout-btn:hover {
        background: rgba(255, 255, 255, 0.3);
      }

      /* Contenedor principal del CMS */
      #nc-root {
        min-height: calc(100vh - 80px);
      }

      /* Mejorar visibilidad de botones del CMS */
      #nc-root .Decap-btn {
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      #nc-root .Decap-btn-primary {
        background: linear-gradient(135deg, #FF6600 0%, #CC5200 100%);
        box-shadow: 0 4px 15px rgba(255, 102, 0, 0.4);
      }

      #nc-root .Decap-btn-primary:hover {
        box-shadow: 0 6px 20px rgba(255, 102, 0, 0.6);
      }

      /* Mejorar preview de imágenes en el editor */
      #nc-root .image-widget__image-wrapper {
        background: #2D2D2D;
        border-radius: 8px;
        padding: 1rem;
      }

      #nc-root .image-widget__image {
        max-width: 100%;
        height: auto;
        border-radius: 4px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      }

      /* Editor field styling */
      #nc-root .Decap-input,
      #nc-root .Decap-select {
        background: #2D2D2D;
        border: 1px solid #404040;
        color: #fff;
        border-radius: 6px;
      }

      #nc-root .Decap-input:focus,
      #nc-root .Decap-select:focus {
        border-color: #FF6600;
        box-shadow: 0 0 0 3px rgba(255, 102, 0, 0.2);
      }

      /* Label styling */
      #nc-root .Decap-input-label,
      #nc-root .Decap-select-label {
        color: #fff;
        font-weight: 600;
      }

      /* Hint text */
      #nc-root .Decap-field-hint {
        color: #aaa;
        font-size: 0.85rem;
      }

      /* Editor controls - IMPORTANT for save buttons */
      #nc-root .editor-control-bar {
        background: #2D2D2D;
        border-bottom: 1px solid #404040;
      }

      #nc-root .editor-control-bar-btn {
        color: #fff;
      }

      /* Save button container */
      #nc-root .publish-controls {
        position: sticky;
        bottom: 0;
        background: #1A1A1A;
        padding: 1rem;
        border-top: 1px solid #404040;
        z-index: 100;
      }

      #nc-root .publish-controls button {
        min-width: 120px;
        padding: 0.75rem 1.5rem;
      }

      /* Editor container */
      #nc-root .editor-editor {
        background: #1A1A1A;
      }

      /* Ensure buttons are visible */
      #nc-root button:not(:disabled) {
        cursor: pointer;
      }

      #nc-root button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* ==========================================
         CSS RESET AGRESIVO PARA BOTONES DECAP
         ========================================== */

      /* Forzar visibilidad de TODOS los botones en el editor */
      #nc-root [class*="publish"],
      #nc-root [class*="save"],
      #nc-root [class*="Save"],
      #nc-root [class*="control"],
      #nc-root [class*="toolbar"],
      #nc-root [class*="entry-toolbar"],
      #nc-root [class*="editor-toolbar"] {
        display: block !important;
        visibility: visible !important;
        opacity: 1 !important;
        background: #2D2D2D !important;
        min-height: 60px !important;
      }

      /* Botones primarios (Save/Publish) */
      #nc-root button[class*="primary"],
      #nc-root button[type="submit"],
      #nc-root [class*="publish"] button,
      #nc-root [class*="save"] button {
        background: linear-gradient(135deg, #FF6600 0%, #CC5200 100%) !important;
        color: #ffffff !important;
        border: none !important;
        padding: 12px 24px !important;
        border-radius: 6px !important;
        font-weight: 700 !important;
        text-transform: uppercase !important;
        letter-spacing: 1px !important;
        cursor: pointer !important;
        display: inline-block !important;
        visibility: visible !important;
        opacity: 1 !important;
        box-shadow: 0 4px 15px rgba(255, 102, 0, 0.4) !important;
      }

      #nc-root button[class*="primary"]:hover,
      #nc-root button[type="submit"]:hover {
        background: linear-gradient(135deg, #FF8533 0%, #FF6600 100%) !important;
        box-shadow: 0 6px 25px rgba(255, 102, 0, 0.6) !important;
        transform: translateY(-2px) !important;
      }

      /* Barra de controles superior del editor */
      #nc-root [class*="toolbar"],
      #nc-root [class*="control-bar"] {
        background: #1A1A1A !important;
        border-bottom: 2px solid #FF6600 !important;
        padding: 1rem !important;
        display: flex !important;
        justify-content: flex-end !important;
        gap: 1rem !important;
      }

      /* Contenedor de botones de publicación */
      #nc-root [class*="publish-controls"],
      #nc-root [class*="save-controls"] {
        position: fixed !important;
        bottom: 0 !important;
        left: 0 !important;
        right: 0 !important;
        background: #1A1A1A !important;
        border-top: 2px solid #FF6600 !important;
        padding: 1rem 2rem !important;
        display: flex !important;
        justify-content: flex-end !important;
        gap: 1rem !important;
        z-index: 9999 !important;
        box-shadow: 0 -4px 20px rgba(0,0,0,0.5) !important;
      }

      /* Botón Delete (rojo) */
      #nc-root button[class*="delete"],
      #nc-root button[class*="Delete"] {
        background: linear-gradient(135deg, #E63946 0%, #9B2226) !important;
        color: #ffffff !important;
      }

      /* Botón secundario */
      #nc-root button[class*="secondary"],
      #nc-root button:not([class*="primary"]):not([class*="delete"]) {
        background: #404040 !important;
        color: #ffffff !important;
        border: 1px solid #666 !important;
      }

      /* Asegurar que el contenido del editor sea visible */
      #nc-root [class*="editor"],
      #nc-root [class*="Editor"] {
        background: #1A1A1A !important;
        color: #ffffff !important;
      }

      /* Spacer para que el contenido no quede detrás del fixed toolbar */
      #nc-root > div:first-child {
        padding-bottom: 80px !important;
      }

      /* Responsive */
      @media (max-width: 768px) {
        .cms-header {
          padding: 1rem;
        }

        .cms-logo-text h1 {
          font-size: 1.4rem;
        }

        .cms-logo-text span {
          font-size: 0.65rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- Header Personalizado -->
    <header class="cms-header">
      <div class="cms-header-content">
        <div class="cms-logo">
          <img src="../assets/logo/logo.png" alt="MXZONE" />
          <div class="cms-logo-text">
            <h1>MXZONE CMS</h1>
            <span>PANEL ADMINISTRATIVO</span>
          </div>
        </div>
      </div>
      <div class="cms-header-actions">
        <div class="cms-user-info" id="userInfo" style="display: none;">
          <div class="cms-user-avatar" id="userAvatar"></div>
          <span id="userEmail"></span>
          <button class="cms-logout-btn" onclick="netlifyIdentity.logout()">Cerrar sesion</button>
        </div>
      </div>
    </header>

    <!-- Contenedor del CMS -->
    <div id="nc-root"></div>

    <!-- Decap CMS - Se auto-inicializa automáticamente -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <!-- Scripts -->
    <script>
      // Debug: Log CMS errors
      window.addEventListener('error', function(e) {
        console.error('[CMS Error]', e.message, e.filename, e.lineno);
      });

      // Configurar Netlify Identity
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on('init', function(user) {
          console.log('[Identity] init', user ? 'user logged in' : 'no user');
          if (user) {
            updateUserInfo(user);
          }
        });

        window.netlifyIdentity.on('login', function(user) {
          console.log('[Identity] login', user?.email);
          if (user) {
            updateUserInfo(user);
            window.location.hash = '';
          }
        });

        window.netlifyIdentity.on('logout', function() {
          console.log('[Identity] logout');
          document.getElementById('userInfo').style.display = 'none';
        });

        window.netlifyIdentity.on('error', function(err) {
          console.error('[Identity] error', err);
        });

        // Manejar tokens de recovery/invite
        var hash = window.location.hash;
        if (hash && (hash.indexOf('invite_token') !== -1 || hash.indexOf('recovery_token') !== -1)) {
          console.log('[Identity] Found token in URL, opening login');
          window.netlifyIdentity.open('login');
        }
      }

      function updateUserInfo(user) {
        document.getElementById('userInfo').style.display = 'flex';
        document.getElementById('userEmail').textContent = user.email.split('@')[0];
        document.getElementById('userAvatar').textContent = user.email.charAt(0).toUpperCase();
      }

      // Decap CMS event listeners
      document.addEventListener('DOMContentLoaded', function() {
        console.log('[CMS] DOM ready, checking CMS status...');

        // Check if CMS is loaded
        if (window.CMS) {
          console.log('[CMS] CMS object exists:', window.CMS);
        } else {
          console.warn('[CMS] CMS object not found!');
        }

        // Monitor for save button
        const observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            if (mutation.addedNodes.length) {
              mutation.addedNodes.forEach(function(node) {
                if (node.nodeType === 1) {
                  const saveBtn = node.querySelector('button[data-testid="save-button"]') ||
                                  node.querySelector('button[class*="save"]') ||
                                  node.querySelector('button[class*="publish"]');
                  if (saveBtn) {
                    console.log('[CMS] Save button found:', saveBtn);
                    console.log('[CMS] Save button disabled:', saveBtn.disabled);
                  }
                }
              });
            }
          });
        });

        const ncRoot = document.getElementById('nc-root');
        if (ncRoot) {
          observer.observe(ncRoot, { childList: true, subtree: true });
        }
      });
    </script>
  </body>
</html>
