# ============================================
# MXZONE STORE - Decap CMS Configuration
# ============================================

backend:
  name: git-gateway
  branch: main
  commit_messages:
    create: "CMS: Agregar {{collection}} - {{slug}}"
    update: "CMS: Actualizar {{collection}} - {{slug}}"
    delete: "CMS: Eliminar {{collection}} - {{slug}}"

media_folder: "assets/images/cms"
public_folder: "assets/images/cms"

collections:
  # PRODUCTOS
  - name: "productos"
    label: "Productos"
    description: "Gestiona todo el catalogo de productos"
    folder: "cms/productos"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    editor:
      preview: true
    fields:
      - label: "Nombre del Producto"
        name: "name"
        widget: "string"
        required: true
        hint: "Ej: CASCO FOX V1 TOXSYK NEGRO"

      - label: "Precio"
        name: "price"
        widget: "string"
        required: true
        hint: "Formato: $1.234.567 (sin decimales)"

      - label: "Tallas Disponibles"
        name: "sizes"
        widget: "string"
        required: true
        hint: "Ej: S/M/L/XL o 38/39/40/41 o 7-11 US"

      - label: "Imagen del Producto"
        name: "image"
        widget: "image"
        required: true
        hint: "Sube una foto clara del producto. Tamaño recomendado: 800x800px"
        media_library:
          config:
            multiple: true

      - label: "Etiqueta Destacada (Opcional)"
        name: "badge"
        widget: "select"
        required: false
        options:
          - label: "Ninguna"
            value: ""
          - label: "Premium"
            value: "Premium"
          - label: "Top Ventas"
            value: "Top Ventas"
          - label: "Nuevo"
            value: "Nuevo"
          - label: "Edicion Limitada"
            value: "Edicion Limitada"
          - label: "Oferta"
            value: "Oferta"
        hint: "Etiqueta que aparece en la esquina del producto"

      - label: "Categoria"
        name: "category"
        widget: "select"
        required: true
        options:
          - label: "Cascos"
            value: "cascos"
          - label: "Uniformes"
            value: "uniformes"
          - label: "Botas"
            value: "botas"
          - label: "Protecciones"
            value: "protecciones"
        hint: "Selecciona la categoria del producto"

      - label: "Descripcion Corta"
        name: "description"
        widget: "text"
        required: false
        hint: "Breve descripcion para SEO (max 160 caracteres)"
        max_length: 160

  # TESTIMONIOS
  - name: "testimonials"
    label: "Testimonios"
    description: "Opiniones de clientes satisfechos"
    folder: "cms/testimonials"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - label: "Nombre del Cliente"
        name: "name"
        widget: "string"
        required: true
        hint: "Nombre completo o como quiere aparecer"

      - label: "Ciudad, Departamento"
        name: "location"
        widget: "string"
        required: true
        hint: "Ej: Medellin, Antioquia"

      - label: "Testimonio"
        name: "text"
        widget: "text"
        required: true
        hint: "La opinion completa del cliente"

      - label: "Iniciales (Avatar)"
        name: "avatar"
        widget: "string"
        required: true
        hint: "2 letras para el avatar. Ej: CR, JM, DG"

  # CONFIGURACION GENERAL
  - name: "settings"
    label: "Configuracion"
    description: "Datos de contacto y redes sociales"
    editor:
      preview: false
    files:
      - name: "general"
        label: "Datos Generales"
        file: "cms/settings/general.yml"
        fields:
          - label: "Numero de WhatsApp"
            name: "whatsapp"
            widget: "string"
            required: true
            hint: "Solo numeros con codigo de pais. Ej: 573176692997"

          - label: "Direccion Fisica"
            name: "address"
            widget: "string"
            required: true
            hint: "Direccion completa de la tienda"

          - label: "Email de Contacto"
            name: "email"
            widget: "string"
            required: true
            hint: "Email para consultas"

          - label: "Facebook URL"
            name: "facebook"
            widget: "string"
            required: false
            hint: "Link completo a tu pagina de Facebook"

          - label: "Instagram URL"
            name: "instagram"
            widget: "string"
            required: false
            hint: "Link completo a tu perfil de Instagram"

          - label: "TikTok URL"
            name: "tiktok"
            widget: "string"
            required: false
            hint: "Link completo a tu perfil de TikTok"
