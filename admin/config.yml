# ============================================
# MXZONE STORE - Decap CMS Configuration
# Panel Administrativo Intuitivo
# ============================================

backend:
  name: git-gateway
  branch: main
  commit_messages:
    create: "CMS: Agregar {{collection}} - {{slug}}"
    update: "CMS: Actualizar {{collection}} - {{slug}}"
    delete: "CMS: Eliminar {{collection}} - {{slug}}"

media_folder: "assets/images/cms"
public_folder: "assets/images/cms"

# ============================================
# COLECCIONES - ORGANIZADAS POR CATEGORÍA
# ============================================
collections:

  # ──────────────────────────────────────────
  # 📦 PRODUCTOS
  # ──────────────────────────────────────────
  - name: "productos"
    label: "📦 Productos"
    description: "Gestiona todo el catálogo de productos"
    folder: "cms/productos"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    editor:
      preview: true
    fields:
      - label: "🏷️ Nombre del Producto"
        name: "name"
        widget: "string"
        required: true
        hint: "Ej: CASCO FOX V1 TOXSYK NEGRO"
        pattern: ['^[A-Z0-9\s\-\.]+$', "Debe estar en MAYÚSCULAS"]

      - label: "💰 Precio"
        name: "price"
        widget: "string"
        required: true
        hint: "Formato: $1.234.567 (sin decimales)"
        pattern: ['^\$\d{1,3}(\.\d{3})*$', "Formato inválido. Usa: $1.234.567"]

      - label: "📏 Tallas Disponibles"
        name: "sizes"
        widget: "string"
        required: true
        hint: "Ej: S/M/L/XL o 38/39/40/41 o 7-11 US"

      - label: "🖼️ Imagen del Producto"
        name: "image"
        widget: "image"
        required: true
        hint: "Sube una foto clara del producto. Tamaño recomendado: 800x800px"
        media_library:
          config:
            multiple: true

      - label: "🏷️ Etiqueta Destacada (Opcional)"
        name: "badge"
        widget: "select"
        required: false
        options:
          - { label: "Ninguna", value: "" }
          - { label: "⭐ Premium", value: "Premium" }
          - { label: "🔥 Top Ventas", value: "Top Ventas" }
          - { label: "✨ Nuevo", value: "Nuevo" }
          - { label: "📦 Edición Limitada", value: "Edición Limitada" }
          - { label: "💰 Oferta", value: "Oferta" }
        hint: "Etiqueta que aparece en la esquina del producto"

      - label: "📂 Categoría"
        name: "category"
        widget: "select"
        required: true
        options:
          - { label: "🪖 Cascos", value: "cascos" }
          - { label: "👕 Uniformes", value: "uniformes" }
          - { label: "👢 Botas", value: "botas" }
          - { label: "🛡️ Protecciones", value: "protecciones" }
        hint: "Selecciona la categoría del producto"

      - label: "📝 Descripción Corta"
        name: "description"
        widget: "text"
        required: false
        hint: "Breve descripción para SEO (máx 160 caracteres)"
        max_length: 160

    # Vista previa personalizada
    preview:
      fields:
        - { label: "Producto", widget: "string" }
        - { label: "Precio", widget: "string" }
        - { label: "Imagen", widget: "image" }

  # ──────────────────────────────────────────
  # ⭐ TESTIMONIOS
  # ──────────────────────────────────────────
  - name: "testimonials"
    label: "⭐ Testimonios"
    description: "Opiniones de clientes satisfechos"
    folder: "cms/testimonials"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - label: "👤 Nombre del Cliente"
        name: "name"
        widget: "string"
        required: true
        hint: "Nombre completo o como quiere aparecer"

      - label: "📍 Ciudad, Departamento"
        name: "location"
        widget: "string"
        required: true
        hint: "Ej: Medellín, Antioquia"

      - label: "💬 Testimonio"
        name: "text"
        widget: "text"
        required: true
        hint: "La opinión completa del cliente"

      - label: "🔤 Iniciales (Avatar)"
        name: "avatar"
        widget: "string"
        required: true
        hint: "2 letras para el avatar. Ej: CR, JM, DG"
        pattern: ['^[A-Z]{2}$', "Debe ser exactamente 2 letras mayúsculas"]

  # ──────────────────────────────────────────
  # ⚙️ CONFIGURACIÓN GENERAL
  # ──────────────────────────────────────────
  - name: "settings"
    label: "⚙️ Configuración"
    description: "Datos de contacto y redes sociales"
    editor:
      preview: false
    files:
      - name: "general"
        label: "📋 Datos Generales"
        file: "cms/settings/general.yml"
        fields:
          - label: "📱 Número de WhatsApp"
            name: "whatsapp"
            widget: "string"
            required: true
            hint: "Solo números con código de país. Ej: 573176692997"
            pattern: ['^\d{10,15}$', "Ingresa solo números (10-15 dígitos)"]

          - label: "📍 Dirección Física"
            name: "address"
            widget: "string"
            required: true
            hint: "Dirección completa de la tienda"

          - label: "✉️ Email de Contacto"
            name: "email"
            widget: "string"
            required: true
            hint: "Email para consultas"
            pattern: ['^[^@]+@[^@]+\.[^@]+$', "Formato de email inválido"]

          - label: "📘 Facebook URL"
            name: "facebook"
            widget: "string"
            required: false
            hint: "Link completo a tu página de Facebook"

          - label: "📸 Instagram URL"
            name: "instagram"
            widget: "string"
            required: false
            hint: "Link completo a tu perfil de Instagram"

          - label: "🎵 TikTok URL"
            name: "tiktok"
            widget: "string"
            required: false
            hint: "Link completo a tu perfil de TikTok"
